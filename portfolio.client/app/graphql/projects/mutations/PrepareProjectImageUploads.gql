fragment ProjectImageUploadInstruction on ProjectImageUploadInstruction {
    clientId
    projectImageId
    full {
        contentType
        key
        publicUrl
        uploadUrl
    }
    thumb {
        contentType
        key
        publicUrl
        uploadUrl
    }
}

mutation prepareProjectImageUploads($input: RequestProjectImageUploadsInput!) {
    prepareProjectImageUploads(input: $input) {
        projectId
        items {
            ...ProjectImageUploadInstruction
        }
    }
}
