mutation prepareProjectImageUploads($input: RequestProjectImageUploadsInput!) {
    prepareProjectImageUploads(input: $input) {
        projectId
        items {
            clientId
            projectImageId
            full {
                contentType
                key
                publicUrl
                uploadUrl
            }
            thumb {
                contentType
                key
                publicUrl
                uploadUrl
            }
        }
    }
}
